version: "2"

run:
  timeout: 5m
  tests: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 50

linters:
  enable:
    - asciicheck
    - bidichk
    - copyloopvar
    - errcheck
    - errorlint
    - gocritic
    - godot
    - gosec
    - govet
    - ineffassign
    - misspell
    - modernize
    - nilerr
    - staticcheck
    - unconvert
    - unused

  disable:
    - err113
    - lll
    - mnd
    - prealloc
    - varnamelen
    - wrapcheck

  exclusions:
    rules:
      - path: _test\.go
        linters: [gosec]
      - path: tests/archivefixture/
        linters: [gosec]

formatters:
  enable:
    - gofmt
    - gofumpt
