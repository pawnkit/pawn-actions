name: Validate PawnKit release set
description: Validate a pinned PawnKit tested release set
inputs:
  release-set:
    description: Release-set path, relative to the caller workspace
    required: true
  verify-remote:
    description: Check public tags, schemas, workflow evidence, and artifacts
    default: 'true'
  component:
    description: Optional component artifact to select
    default: ''
  target:
    description: Target for the selected artifact
    default: ''
outputs:
  version:
    description: Selected component version
    value: ${{ steps.validate.outputs.version }}
  commit:
    description: Selected component commit
    value: ${{ steps.validate.outputs.commit }}
  url:
    description: Selected artifact URL
    value: ${{ steps.validate.outputs.url }}
  size:
    description: Selected artifact size
    value: ${{ steps.validate.outputs.size }}
  sha256:
    description: Selected artifact SHA-256 digest
    value: ${{ steps.validate.outputs.sha256 }}
runs:
  using: composite
  steps:
    - id: validate
      shell: bash
      env:
        PAWN_RELEASE_SET: ${{ inputs.release-set }}
        PAWN_VERIFY_REMOTE: ${{ inputs.verify-remote }}
        PAWN_COMPONENT: ${{ inputs.component }}
        PAWN_TARGET: ${{ inputs.target }}
      run: |
        case "$PAWN_RELEASE_SET" in
          /*|[A-Za-z]:*) set_path="$PAWN_RELEASE_SET" ;;
          *) set_path="$GITHUB_WORKSPACE/$PAWN_RELEASE_SET" ;;
        esac

        args=()
        if [ "$PAWN_VERIFY_REMOTE" = true ]; then
          args+=("-verify-remote")
        fi
        if [ -n "$PAWN_COMPONENT$PAWN_TARGET" ]; then
          args+=("-component" "$PAWN_COMPONENT" "-target" "$PAWN_TARGET" "-github-output" "$GITHUB_OUTPUT")
        fi

        cd "$GITHUB_ACTION_PATH/.."
        go run ./cmd/pawn-release-set "${args[@]}" "$set_path"
