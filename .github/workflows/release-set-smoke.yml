name: Release set smoke
on:
  push:
    branches: [main]
    paths:
      - .github/workflows/release-set-smoke.yml
      - cmd/pawn-release-set/**
      - release-set/**
      - releaseset/**
      - setup/**
      - setup-tool/**
      - build/**
  workflow_dispatch:
    inputs:
      spec-ref:
        description: Exact pawnkit-spec tag or commit
        required: true
        default: v0.1.12
      set-path:
        description: Path below pawnkit-spec
        required: true
        default: release-sets/toolchain-preview-2026-07-23.json
      corpus-ref:
        description: Exact pawn-corpus tag or commit
        required: true
        default: v0.1.7
  workflow_call:
    inputs:
      spec-ref:
        description: Exact pawnkit-spec tag or commit
        required: true
        type: string
      set-path:
        description: Path below pawnkit-spec
        required: true
        type: string
      corpus-ref:
        description: Exact pawn-corpus tag or commit
        required: true
        type: string
permissions:
  contents: read
env:
  SPEC_REF: ${{ inputs.spec-ref || 'v0.1.12' }}
  SET_PATH: ${{ inputs.set-path || 'release-sets/toolchain-preview-2026-07-23.json' }}
  CORPUS_REF: ${{ inputs.corpus-ref || 'v0.1.7' }}
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: pawnkit/pawnkit-spec
          ref: ${{ env.SPEC_REF }}
          path: .pawnkit/spec
          persist-credentials: false
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: pawnkit/pawn-actions
          ref: ${{ github.workflow_sha }}
          path: .pawnkit/actions
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: .pawnkit/actions/go.mod
          cache-dependency-path: .pawnkit/actions/go.sum
      - uses: ./.pawnkit/actions/release-set
        with:
          release-set: .pawnkit/spec/${{ env.SET_PATH }}
          verify-remote: 'true'

  smoke:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
            pawn-sha256: 530b6da4c697a3dbc8d19498ea730025191f667b0af4d390ac20d98e263e8e5a
          - os: windows-latest
            target: windows-amd64
            pawn-sha256: 7d0cf31c6542a25ba16d3725ab8d1cb7f3a85a948031153626a12765198ebffc
          - os: macos-latest
            target: darwin-arm64
            pawn-sha256: e959351871a1cd555ccecb7f81f7ecc033c55b071871ff7ce6c9446fce7bbac7
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: pawnkit/pawnkit-spec
          ref: ${{ env.SPEC_REF }}
          path: .pawnkit/spec
          persist-credentials: false
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: pawnkit/pawn-actions
          ref: ${{ github.workflow_sha }}
          path: .pawnkit/actions
          persist-credentials: false
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: pawnkit/pawn-corpus
          ref: ${{ env.CORPUS_REF }}
          path: .pawnkit/corpus
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: .pawnkit/actions/go.mod
          cache-dependency-path: .pawnkit/actions/go.sum
      - uses: ./.pawnkit/actions/setup
        with:
          version: 1.2.0
          download-url: https://github.com/pawnkit/pawnkit-cli/releases/download/v1.2.0/pawn-${{ matrix.target }}.tar.gz
          sha256: ${{ matrix.pawn-sha256 }}
      - id: pawnfmt
        uses: ./.pawnkit/actions/release-set
        with:
          release-set: .pawnkit/spec/${{ env.SET_PATH }}
          verify-remote: 'false'
          component: pawnfmt
          target: ${{ matrix.target }}
      - uses: ./.pawnkit/actions/setup-tool
        with:
          binary: pawnfmt
          version: ${{ steps.pawnfmt.outputs.version }}
          download-url: ${{ steps.pawnfmt.outputs.url }}
          sha256: ${{ steps.pawnfmt.outputs.sha256 }}
      - id: pawnlint
        uses: ./.pawnkit/actions/release-set
        with:
          release-set: .pawnkit/spec/${{ env.SET_PATH }}
          verify-remote: 'false'
          component: pawnlint
          target: ${{ matrix.target }}
      - uses: ./.pawnkit/actions/setup-tool
        with:
          binary: pawnlint
          version: ${{ steps.pawnlint.outputs.version }}
          download-url: ${{ steps.pawnlint.outputs.url }}
          sha256: ${{ steps.pawnlint.outputs.sha256 }}
      - id: pawnlsp
        uses: ./.pawnkit/actions/release-set
        with:
          release-set: .pawnkit/spec/${{ env.SET_PATH }}
          verify-remote: 'false'
          component: pawnlsp
          target: ${{ matrix.target }}
      - uses: ./.pawnkit/actions/setup-tool
        with:
          binary: pawnlsp
          version: ${{ steps.pawnlsp.outputs.version }}
          download-url: ${{ steps.pawnlsp.outputs.url }}
          sha256: ${{ steps.pawnlsp.outputs.sha256 }}
      - id: pawntest
        uses: ./.pawnkit/actions/release-set
        with:
          release-set: .pawnkit/spec/${{ env.SET_PATH }}
          verify-remote: 'false'
          component: pawntest
          target: ${{ matrix.target }}
      - id: pawntest-install
        uses: ./.pawnkit/actions/setup-tool
        with:
          binary: pawntest
          version: ${{ steps.pawntest.outputs.version }}
          download-url: ${{ steps.pawntest.outputs.url }}
          sha256: ${{ steps.pawntest.outputs.sha256 }}
      - name: Check installed tools
        shell: bash
        run: |
          pawn --version
          pawnfmt --version
          pawnlint --version
          pawnlsp --version
          pawntest --version
          test -f "${{ steps.pawntest-install.outputs.path }}/include/pawntest.inc"
      - name: Check golden projects
        shell: bash
        run: |
          formatted="$(mktemp -d)"
          for project in minimal-samp-gamemode filterscript-with-includes; do
            path=".pawnkit/corpus/projects/$project"
            pawn doctor --project "$path"
            pawn check --project "$path" --only project,lint
            pawnlint "$path"
            cp -R "$path" "$formatted/$project"
            pawnfmt --write "$formatted/$project"
            pawnfmt --check "$formatted/$project"
          done

  build:
    needs: validate
    runs-on: ubuntu-latest
    env:
      LD_LIBRARY_PATH: ${{ github.workspace }}/pawnc-3.10.10-linux/lib
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: pawnkit/pawn-actions
          ref: ${{ github.workflow_sha }}
          path: .pawnkit/actions
          persist-credentials: false
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: pawnkit/pawn-corpus
          ref: ${{ env.CORPUS_REF }}
          path: .pawnkit/corpus
          persist-credentials: false
      - uses: ./.pawnkit/actions/setup
        with:
          version: 1.2.0
          download-url: https://github.com/pawnkit/pawnkit-cli/releases/download/v1.2.0/pawn-linux-amd64.tar.gz
          sha256: 530b6da4c697a3dbc8d19498ea730025191f667b0af4d390ac20d98e263e8e5a
      - name: Install 32-bit compiler runtime
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libc6-i386
      - name: Install Pawn 3.10.10
        shell: bash
        run: |
          wget -q https://github.com/pawn-lang/compiler/releases/download/v3.10.10/pawnc-3.10.10-linux.tar.gz
          echo "9bbb1df6e933318fce1fa61951e4196b70613c637a5a1d4c96937e147c18468d  pawnc-3.10.10-linux.tar.gz" | sha256sum -c -
          tar -xzf pawnc-3.10.10-linux.tar.gz
      - uses: ./.pawnkit/actions/build
        with:
          project: .pawnkit/corpus/projects/minimal-samp-gamemode
          compiler: ${{ github.workspace }}/pawnc-3.10.10-linux/bin/pawncc
          artifact: ${{ runner.temp }}/minimal-samp-gamemode.amx
          output: json
          result-file: ${{ runner.temp }}/minimal-samp-gamemode.json
      - uses: ./.pawnkit/actions/build
        with:
          project: .pawnkit/corpus/projects/filterscript-with-includes
          compiler: ${{ github.workspace }}/pawnc-3.10.10-linux/bin/pawncc
          artifact: ${{ runner.temp }}/filterscript-with-includes.amx
          output: json
          result-file: ${{ runner.temp }}/filterscript-with-includes.json
