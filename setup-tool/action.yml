name: Setup PawnKit tool
description: Install a checksum-verified PawnKit tool archive
inputs:
  binary:
    description: Tool executable name
    required: true
  version:
    description: Exact tool version
    required: true
  download-url:
    description: HTTPS GitHub release archive
    required: true
  sha256:
    description: Expected lowercase SHA-256 digest
    required: true
outputs:
  path:
    description: Installed tool directory
    value: ${{ steps.install.outputs.path }}
  version:
    description: Installed tool version
    value: ${{ steps.install.outputs.version }}
runs:
  using: composite
  steps:
    - id: cache
      uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809
      with:
        path: ${{ runner.tool_cache }}/pawnkit/${{ inputs.binary }}/${{ inputs.version }}/${{ runner.os }}-${{ runner.arch }}
        key: pawnkit-${{ inputs.binary }}-${{ inputs.version }}-${{ runner.os }}-${{ runner.arch }}-${{ inputs.sha256 }}
    - id: install
      shell: bash
      env:
        PAWN_TOOL_BINARY: ${{ inputs.binary }}
        PAWN_TOOL_VERSION: ${{ inputs.version }}
        PAWN_TOOL_URL: ${{ inputs.download-url }}
        PAWN_TOOL_SHA256: ${{ inputs.sha256 }}
        PAWN_TOOL_DESTINATION: ${{ runner.tool_cache }}/pawnkit/${{ inputs.binary }}/${{ inputs.version }}/${{ runner.os }}-${{ runner.arch }}
      run: |
        cd "$GITHUB_ACTION_PATH/.."
        go run ./cmd/pawn-tool-install \
          -binary "$PAWN_TOOL_BINARY" \
          -version "$PAWN_TOOL_VERSION" \
          -url "$PAWN_TOOL_URL" \
          -sha256 "$PAWN_TOOL_SHA256" \
          -destination "$PAWN_TOOL_DESTINATION"
