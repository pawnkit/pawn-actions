name: Setup PawnKit
description: Install a checksum-verified pawn CLI release
inputs:
  version:
    description: Exact pawn CLI version
    required: true
  download-url:
    description: HTTPS URL of the pawn CLI tar.gz archive
    required: true
  sha256:
    description: Expected lowercase SHA-256 digest
    required: true
outputs:
  version:
    description: Installed pawn CLI version
    value: ${{ steps.install.outputs.version }}
  cache-hit:
    description: Whether the verified tool cache was restored
    value: ${{ steps.install.outputs.cache-hit }}
  path:
    description: Installed pawn binary directory
    value: ${{ steps.install.outputs.path }}
runs:
  using: composite
  steps:
    - shell: bash
      env:
        PAWN_VERSION: ${{ inputs.version }}
        PAWN_DOWNLOAD_URL: ${{ inputs.download-url }}
        PAWN_SHA256: ${{ inputs.sha256 }}
      run: '"$GITHUB_ACTION_PATH/validate.sh"'
    - id: cache
      uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809
      with:
        path: ${{ runner.tool_cache }}/pawn/${{ inputs.version }}/${{ runner.os }}-${{ runner.arch }}
        key: pawn-${{ inputs.version }}-${{ runner.os }}-${{ runner.arch }}-${{ inputs.sha256 }}
    - id: install
      shell: bash
      env:
        PAWN_VERSION: ${{ inputs.version }}
        PAWN_DOWNLOAD_URL: ${{ inputs.download-url }}
        PAWN_SHA256: ${{ inputs.sha256 }}
        PAWN_CACHE_HIT: ${{ steps.cache.outputs.cache-hit }}
        PAWN_INSTALL_DIR: ${{ runner.tool_cache }}/pawn/${{ inputs.version }}/${{ runner.os }}-${{ runner.arch }}
      run: '"$GITHUB_ACTION_PATH/install.sh"'
